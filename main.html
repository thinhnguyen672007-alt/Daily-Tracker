<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful and modern daily activity tracker.">
    <title>Daily Activity Tracker</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Activity Tracker</h1>
            <p>Stay organized, stay productive.</p>
        </header>

        <main>
            <form id="activity-form" class="glass-panel">
                <input type="text" id="activity-input" placeholder="What do you need to do today?" required autocomplete="off">
                <button type="submit" id="add-btn" aria-label="Add activity">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </form>

            <div class="list-container">
                <div class="loading-spinner" id="loading-spinner" style="display: none;">
                    <div class="spinner"></div>
                </div>
                <ul id="activity-list">
                    <!-- Activities will be injected here via JavaScript -->
                </ul>
                <div id="empty-state" class="empty-state" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 12h8"></path></svg>
                    <p>No activities yet. Add one above!</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Frontend logic -->
    <script src="frontend.js"></script>
</body>
</html>
